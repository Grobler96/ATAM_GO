<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ATAM GO — Overdue Orders</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0; height: 100%;
    background: radial-gradient(circle at top left, rgba(239,68,68,0.10), transparent 32%),
                radial-gradient(circle at top right, rgba(56,189,248,0.08), transparent 30%),
                linear-gradient(135deg, #020617 0%, #0f172a 45%, #020617 100%);
    color: #f8fafc;
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    overflow: hidden;
  }
  .wrap { display: flex; flex-direction: column; height: 100vh; padding: 28px 40px; }

  .header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px; flex-shrink: 0;
  }
  .header-left { display: flex; align-items: center; gap: 18px; }
  .header-left img { height: 48px; background: rgba(255,255,255,0.92); padding: 6px; border-radius: 10px; }
  .header-title { font-size: 13px; font-weight: 900; letter-spacing: 0.14em; text-transform: uppercase; color: #f87171; margin: 0; }
  .header-title span { color: #94a3b8; font-weight: 700; letter-spacing: 0.06em; margin-left: 10px; }
  .clock { font-size: 22px; font-weight: 800; color: #cbd5e1; font-variant-numeric: tabular-nums; }

  .summary-bar {
    display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; flex-shrink: 0;
  }
  .summary-card {
    border-radius: 20px; padding: 18px 22px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(15,23,42,0.82); backdrop-filter: blur(18px);
    box-shadow: 0 22px 60px rgba(0,0,0,0.35);
  }
  .summary-card span { display: block; color: #94a3b8; font-size: 12px; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px; }
  .summary-card strong { display: block; font-size: 34px; font-weight: 900; letter-spacing: -0.03em; }
  .summary-card.danger strong { color: #f87171; }
  .summary-card.amber strong { color: #fbbf24; }

  /* ── Card grid, matching dispatch.js card structure ── */
  .card-panel { flex: 1; min-height: 0; display: flex; flex-direction: column; }
  .card-grid {
    flex: 1; overflow-y: auto;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 22px;
    padding: 4px 6px 20px 2px;
  }

  .order-card {
    position: relative;
    background: #0d1525;
    border: 1px solid rgba(239,68,68,0.35);
    border-radius: 14px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    overflow: visible;
    /* Red glow behind the card — the main ask */
    box-shadow:
      0 0 0 1px rgba(239,68,68,0.15),
      0 0 34px 6px rgba(239,68,68,0.35),
      0 0 70px 14px rgba(239,68,68,0.16);
    animation: glow-pulse 2.6s ease-in-out infinite;
  }
  .order-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 4px; height: 100%;
    border-radius: 14px 0 0 14px;
    background: #ef4444;
  }
  @keyframes glow-pulse {
    0%, 100% {
      box-shadow:
        0 0 0 1px rgba(239,68,68,0.15),
        0 0 34px 6px rgba(239,68,68,0.35),
        0 0 70px 14px rgba(239,68,68,0.16);
    }
    50% {
      box-shadow:
        0 0 0 1px rgba(239,68,68,0.22),
        0 0 46px 10px rgba(239,68,68,0.5),
        0 0 90px 20px rgba(239,68,68,0.24);
    }
  }

  .oc-header { display: flex; align-items: center; justify-content: space-between; }
  .oc-order-id { font-size: 19px; font-weight: 800; color: #e8edf5; letter-spacing: -0.5px; }
  .oc-hash { color: #64748b; font-weight: 400; }
  .oc-urgency-dot {
    width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0;
    background: #ef4444; box-shadow: 0 0 6px #ef4444;
    animation: pulse-red-dot 1s infinite;
  }
  @keyframes pulse-red-dot {
    0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.5); }
    50% { box-shadow: 0 0 0 8px rgba(239,68,68,0); }
  }

  .oc-customer { font-size: 16px; font-weight: 700; color: #f8fafc; line-height: 1.2; }
  .oc-store { font-size: 12px; color: #64748b; margin-top: -8px; }

  .oc-meta-row { display: flex; gap: 16px; }
  .oc-meta-item { display: flex; flex-direction: column; gap: 2px; flex: 1; }
  .oc-meta-label { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #64748b; }
  .oc-meta-val { font-size: 14px; color: #cbd5e1; }
  .oc-meta-val strong { color: #f8fafc; }

  .oc-countdown {
    font-size: 14px; font-weight: 800; color: #fca5a5;
    background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);
    border-radius: 8px; padding: 9px 12px; text-align: center;
    font-variant-numeric: tabular-nums;
    animation: flicker 1.6s ease-in-out infinite;
  }
  .oc-countdown.today { color: #fde68a; background: rgba(245,158,11,0.1); border-color: rgba(245,158,11,0.3); }
  @keyframes flicker { 0%, 100% { opacity: 1; } 50% { opacity: 0.75; } }

  .empty-state {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: #4ade80; gap: 14px;
  }
  .empty-state .big { font-size: 64px; }
  .empty-state .msg { font-size: 26px; font-weight: 800; }

  .footer { margin-top: 16px; text-align: right; color: #475569; font-size: 12px; flex-shrink: 0; }
</style>
</head>
<body>

<script>
  // Session check — same pattern as index.html. Kiosk browsers stay signed in
  // via Supabase's persisted session, so this only needs logging in once.
  (async () => {
    const cfg = window.ATAM_GO_CONFIG || {};
    const _sb = supabase.createClient(cfg.SUPABASE_URL, cfg.SUPABASE_ANON_KEY);
    const { data: { session } } = await _sb.auth.getSession();
    if (!session) window.location.replace('./login.html');
  })();
</script>

<div class="wrap">
  <div class="header">
    <div class="header-left">
      <img src="atam-go-logo.png?v=4" alt="ATAM GO logo" />
      <p class="header-title">Today's Overdue Orders <span id="dateLabel"></span></p>
    </div>
    <div class="clock" id="clock">--:--</div>
  </div>

  <div class="summary-bar">
    <div class="summary-card danger">
      <span>Overdue Orders</span>
      <strong id="overdueCount">—</strong>
    </div>
    <div class="summary-card amber">
      <span>Total Units Overdue</span>
      <strong id="overdueUnits">—</strong>
    </div>
  </div>

  <div class="card-panel">
    <div class="card-grid" id="cardGrid"></div>
  </div>

  <div class="footer" id="lastRefreshed"></div>
</div>

<script>
(function () {
  'use strict';

  const cfg = window.ATAM_GO_CONFIG || {};
  const sb = supabase.createClient(cfg.SUPABASE_URL, cfg.SUPABASE_ANON_KEY);
  const REFRESH_MS = 60 * 1000; // matches dispatch page's refresh cadence

  const $ = id => document.getElementById(id);

  function esc(v) {
    return String(v == null ? '' : v)
      .replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;');
  }
  function num(v) { return new Intl.NumberFormat('en-GB').format(Number(v || 0)); }
  function startOfDay(d) { const x = new Date(d); x.setHours(0, 0, 0, 0); return x; }

  function fmtDate(v) {
    return v ? new Intl.DateTimeFormat('en-GB', { weekday: 'short', day: '2-digit', month: 'short' }).format(new Date(v)) : '—';
  }
  function fmtTime(v) {
    return v ? new Intl.DateTimeFormat('en-GB', { hour: '2-digit', minute: '2-digit' }).format(new Date(v)) : '';
  }

  function updateClock() {
    const now = new Date();
    $('clock').textContent = now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
    $('dateLabel').textContent = now.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long' });
  }

  // Same overdue-by text style as the dispatch page's countdown chip
  function overdueText(dueDate, today) {
    const due = startOfDay(dueDate);
    if (due.getTime() === today.getTime()) return { text: '⚠️ Due today', isToday: true };
    const overByMs = today - due;
    const days = Math.floor(overByMs / 86400000);
    return { text: `⚠️ Overdue by ${days} day${days === 1 ? '' : 's'}`, isToday: false };
  }

  async function load() {
    try {
      const { data, error } = await sb
        .from('late_or_at_risk_orders')
        .select('*')
        .order('date_due', { ascending: true, nullsFirst: false })
        .limit(200);

      if (error) throw error;

      const today = startOfDay(new Date());
      const yesterday = new Date(today);
      yesterday.setDate(yesterday.getDate() - 1);

      // Today's orders, plus yesterday's ONLY if still unshipped (a one-day
      // carry-over) — deliberately not a rolling backlog of weeks/months.
      // The late_or_at_risk_orders view already excludes shipped orders.
      const overdue = (data || [])
        .filter(r => {
          if (!r.date_due) return false;
          const due = startOfDay(r.date_due);
          return due.getTime() === today.getTime() || due.getTime() === yesterday.getTime();
        })
        .sort((a, b) => new Date(a.date_due) - new Date(b.date_due));

      render(overdue, today);
      $('lastRefreshed').textContent = 'Last updated: ' + new Date().toLocaleTimeString('en-GB');
    } catch (e) {
      console.error('Overdue load failed:', e);
      $('cardGrid').innerHTML = `<div class="empty-state"><div class="big">⚠️</div><div class="msg">Could not load data</div></div>`;
    }
  }

  function render(rows, today) {
    const totalUnits = rows.reduce((s, r) => s + Number(r.total_quantity || 0), 0);
    $('overdueCount').textContent = num(rows.length);
    $('overdueUnits').textContent = num(totalUnits);

    const grid = $('cardGrid');

    if (rows.length === 0) {
      grid.innerHTML = `<div class="empty-state"><div class="big">✅</div><div class="msg">Nothing overdue right now</div></div>`;
      return;
    }

    grid.innerHTML = rows.map(r => {
      const overdue = overdueText(r.date_due, today);
      return `
        <div class="order-card">
          <div class="oc-header">
            <div class="oc-order-id"><span class="oc-hash">#</span>${esc(r.order_id)}</div>
            <div class="oc-urgency-dot"></div>
          </div>

          <div class="oc-customer">${esc(r.customer_name || 'Unknown')}</div>
          ${r.store_name ? `<div class="oc-store">${esc(r.store_name)}</div>` : ''}

          <div class="oc-meta-row">
            <div class="oc-meta-item">
              <span class="oc-meta-label">Due</span>
              <span class="oc-meta-val"><strong>${fmtDate(r.date_due)}</strong> ${fmtTime(r.date_due)}</span>
            </div>
            <div class="oc-meta-item">
              <span class="oc-meta-label">Qty</span>
              <span class="oc-meta-val"><strong>${num(r.total_quantity)}</strong> items</span>
            </div>
          </div>

          <div class="oc-meta-row">
            <div class="oc-meta-item">
              <span class="oc-meta-label">Assigned</span>
              <span class="oc-meta-val">${esc(r.assigned_to || 'Unassigned')}</span>
            </div>
            <div class="oc-meta-item">
              <span class="oc-meta-label">Status</span>
              <span class="oc-meta-val">${esc(r.risk_status || 'Overdue')}</span>
            </div>
          </div>

          <div class="oc-countdown ${overdue.isToday ? 'today' : ''}">${overdue.text}</div>
        </div>
      `;
    }).join('');
  }

  updateClock();
  setInterval(updateClock, 30 * 1000);

  load();
  setInterval(load, REFRESH_MS);
})();
</script>

</body>
</html>
